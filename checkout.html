<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 화면 · 올영세일 장바구니 품절 알림</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="checkout-body">
  <header class="checkout-header">
    <button onclick="history.back()">← 장바구니로 돌아가기</button>
    <strong>OLIVE SALE CHECKOUT</strong>
  </header>

  <main class="checkout-container">
    <section class="checkout-title">
      <p class="kicker">PAYMENT</p>
      <h1>결제하기</h1>
      <p>장바구니 재고 상태를 확인한 뒤 결제를 진행하는 데모 화면입니다.</p>
    </section>

    <section class="checkout-layout">
      <section class="card">
        <h2>주문 상품</h2>
        <div id="checkoutItems" class="checkout-items"></div>
      </section>

      <aside class="checkout-side">
        <section class="card">
          <h2>배송 정보</h2>
          <div class="input-group">
            <label>받는 사람</label>
            <input value="최가은" />
          </div>
          <div class="input-group">
            <label>배송지</label>
            <input value="서울특별시 데모구 데모로 123" />
          </div>
          <div class="input-group">
            <label>배송 요청사항</label>
            <select>
              <option>문 앞에 놓아주세요</option>
              <option>직접 받을게요</option>
              <option>배송 전 연락주세요</option>
            </select>
          </div>
        </section>

        <section class="card">
          <h2>결제 수단</h2>
          <label class="pay-option"><input type="radio" name="pay" checked /> 신용/체크카드</label>
          <label class="pay-option"><input type="radio" name="pay" /> 간편결제</label>
          <label class="pay-option"><input type="radio" name="pay" /> 무통장입금</label>
        </section>

        <section class="card order-card">
          <p class="kicker">FINAL PRICE</p>
          <div class="price-line">
            <span>총 상품금액</span>
            <strong id="checkoutOriginal">0원</strong>
          </div>
          <div class="price-line">
            <span>할인금액</span>
            <strong id="checkoutDiscount">0원</strong>
          </div>
          <div class="price-line total">
            <span>최종 결제금액</span>
            <strong id="checkoutFinal">0원</strong>
          </div>
          <button class="checkout-btn" onclick="completePayment()">최종 결제하기</button>
          <p id="riskWarning" class="checkout-note"></p>
        </section>
      </aside>
    </section>
  </main>

  <div id="paymentModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card payment-complete">
      <h2>결제 요청 완료</h2>
      <p>실제 결제는 발생하지 않는 발표용 데모입니다.</p>
      <p>주문 데이터는 사용자 결제 화면 전환 흐름을 보여주기 위해 브라우저에 임시 저장되었습니다.</p>
      <button class="checkout-btn" onclick="location.href='index.html'">장바구니로 돌아가기</button>
    </div>
  </div>

  <script src="checkout.js"></script>
</body>
</html>
